name: S50 Check Signals

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Check 1m
        run: curl -s --max-time 30 "https://s50-forward-test.onrender.com/api/cron/check-signals?tf=1m" || echo "1m failed"
      - name: Check 5m
        run: curl -s --max-time 30 "https://s50-forward-test.onrender.com/api/cron/check-signals?tf=5m" || echo "5m failed"
      - name: Check 15m
        run: curl -s --max-time 30 "https://s50-forward-test.onrender.com/api/cron/check-signals?tf=15m" || echo "15m failed"
