name: S50 Check Signals

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Check all timeframes
        run: |
          URL="https://s50-forward-test.onrender.com/api/cron/check-all"
          echo "Calling: $URL"
          curl -s --max-time 120 "$URL" || echo "Request failed (timeout or error)"
