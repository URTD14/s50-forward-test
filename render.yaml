services:
  - type: web
    name: s50-forward-test
    runtime: python
    region: singapore
    plan: free
    branch: master
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn render_app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        value: https://roxiyshdxpymmcnsiqpz.supabase.co
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false

  - type: cron
    name: s50-check-signals-1m
    runtime: python
    region: singapore
    plan: free
    branch: master
    schedule: "*/5 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -c "import httpx; r=httpx.get('https://s50-forward-test.onrender.com/api/cron/check-signals?tf=1m'); print(r.text)"

  - type: cron
    name: s50-check-signals-5m
    runtime: python
    region: singapore
    plan: free
    branch: master
    schedule: "*/5 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -c "import httpx; r=httpx.get('https://s50-forward-test.onrender.com/api/cron/check-signals?tf=5m'); print(r.text)"

  - type: cron
    name: s50-check-signals-15m
    runtime: python
    region: singapore
    plan: free
    branch: master
    schedule: "*/5 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -c "import httpx; r=httpx.get('https://s50-forward-test.onrender.com/api/cron/check-signals?tf=15m'); print(r.text)"
